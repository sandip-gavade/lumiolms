services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lumio
      POSTGRES_PASSWORD: lumio
      POSTGRES_DB: lumio
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumio -d lumio"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./lumio-be
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./lumio-be/.env
    environment:
      DATABASE_URL: postgresql://lumio:lumio@postgres:5432/lumio # container-to-container, internal port unaffected by host remap
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./lumio-be:/app
      - /app/node_modules

  web:
    build:
      context: ./lumio-fe
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./lumio-fe/.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./lumio-fe:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
  redis_data:
