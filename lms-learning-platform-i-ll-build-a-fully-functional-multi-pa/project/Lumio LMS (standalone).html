document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-radius:8px\"><\u002Fdiv><\u002Fdiv><span style=\"font-size:12.5px;font-weight:700;color:#4F46E5;flex-shrink:0\">{{ pCompletedCount }}/{{ pTotal }}<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <sc-for list=\"{{ playerSections }}\" as=\"sec\" hint-placeholder-count=\"5\">\n          <div>\n            <div style=\"padding:14px 16px 10px;background:#F8FAFC;border-bottom:1px solid #F1F5F9\"><div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:13.5px;color:#1E293B\">{{ sec.title }}<\u002Fdiv><div style=\"font-size:12px;color:#94A3B8;margin-top:2px\">{{ sec.meta }}<\u002Fdiv><\u002Fdiv>\n            <sc-for list=\"{{ sec.lectures }}\" as=\"lec\" hint-placeholder-count=\"4\">\n              <div onclick=\"{{ lec.onClick }}\" style=\"{{ lec.rowStyle }}\">\n                <span style=\"{{ lec.numStyle }}\"><sc-if value=\"{{ lec.done }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"m5 13 4 4L19 7\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fsc-if><\u002Fspan>\n                <span style=\"{{ lec.titleStyle }}\">{{ lec.title }}<\u002Fspan>\n                <span style=\"font-size:12px;color:#94A3B8;flex-shrink:0\">{{ lec.duration }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Faside>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ MY LEARNING ============ -->\n<sc-if value=\"{{ isMyLearning }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"max-width:1100px;width:100%;margin:0 auto;padding:clamp(20px,3vw,40px) clamp(16px,3vw,32px);animation:fadeUp 0.35s ease\">\n  <h1 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:clamp(26px,3vw,34px);letter-spacing:-1px;margin:0 0 6px\">My Learning<\u002Fh1>\n  <p style=\"color:#64748B;font-size:15px;margin:0 0 24px\">{{ mlTotal }} courses · {{ mlInProgress }} in progress · {{ mlCompleted }} completed<\u002Fp>\n  <div style=\"display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px\">\n    <sc-for list=\"{{ mlTabs }}\" as=\"t\" hint-placeholder-count=\"3\"><button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.label }}<\u002Fbutton><\u002Fsc-for>\n  <\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;gap:16px\">\n    <sc-for list=\"{{ myLearning }}\" as=\"c\" hint-placeholder-count=\"3\">\n      <div style=\"background:#fff;border:1px solid #E2E8F0;border-radius:18px;padding:16px;display:flex;flex-wrap:wrap;gap:18px;align-items:center\">\n        <div style=\"width:150px;height:90px;border-radius:12px;background:{{ c.gradient }};position:relative;flex-shrink:0;display:flex;align-items:flex-end;padding:10px;overflow:hidden\"><div style=\"position:absolute;inset:0;background:radial-gradient(circle at 78% 18%,rgba(255,255,255,0.24),transparent 55%)\"><\u002Fdiv><span style=\"position:absolute;top:8px;left:12px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:24px;color:rgba(255,255,255,0.34)\">{{ c.monogram }}<\u002Fspan><\u002Fdiv>\n        <div style=\"flex:1 1 280px;min-width:0\">\n          <div style=\"font-size:12px;font-weight:700;color:#4F46E5;margin-bottom:3px\">{{ c.category }}<\u002Fdiv>\n          <div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:16.5px;color:#1E293B;margin-bottom:3px\">{{ c.title }}<\u002Fdiv>\n          <div style=\"font-size:13px;color:#64748B;margin-bottom:12px\">{{ c.instructor }} · {{ c.completedLabel }}<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px;max-width:420px\"><div style=\"flex:1;height:8px;background:#EEF2FF;border-radius:8px;overflow:hidden\"><div style=\"height:100%;width:{{ c.progressPct }};background:linear-gradient(90deg,#6366F1,#4338CA);border-radius:8px\"><\u002Fdiv><\u002Fdiv><span style=\"font-size:12.5px;font-weig iv style=\"flex:1 1 240px;min-width:0\">\n      <div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:20px\">{{ user.name }}<\u002Fdiv>\n      <div style=\"font-size:14px;color:#64748B;margin-bottom:12px\">{{ user.email }}<\u002Fdiv>\n      <div style=\"font-size:12.5px;font-weight:700;color:#94A3B8;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.4px\">Avatar color<\u002Fdiv>\n      <div style=\"display:flex;gap:12px\">\n        <sc-for list=\"{{ avatarOptions }}\" as=\"a\" hint-placeholder-count=\"6\"><div onclick=\"{{ a.onClick }}\" style=\"{{ a.activeStyle }}\"><\u002Fdiv><\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- account details -->\n  <div style=\"background:#fff;border:1px solid #E2E8F0;border-radius:18px;padding:24px;margin-bottom:22px\">\n    <h2 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:18px;margin:0 0 18px\">Account details<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px\">\n      <div><label style=\"display:block;font-size:13px;font-weight:600;color:#334155;margin-bottom:6px\">Full name<\u002Flabel><input value=\"{{ user.name }}\" onchange=\"{{ onUserName }}\" style=\"width:100%;border:1px solid #E2E8F0;border-radius:11px;padding:12px 14px;font-size:14.5px;outline:none\" style-focus=\"border-color:#4F46E5;box-shadow:0 0 0 3px #EEF2FF\"><\u002Fdiv>\n      <div><label style=\"display:block;font-size:13px;font-weight:600;color:#334155;margin-bottom:6px\">Email address<\u002Flabel><input value=\"{{ user.email }}\" onchange=\"{{ onUserEmail }}\" style=\"width:100%;border:1px solid #E2E8F0;border-radius:11px;padding:12px 14px;font-size:14.5px;outline:none\" style-focus=\"border-color:#4F46E5;box-shadow:0 0 0 3px #EEF2FF\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:18px\"><button style=\"background:#4F46E5;color:#fff;border:none;border-radius:11px;padding:11px 22px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:14px;cursor:pointer\" style-hover=\"background:#4338CA\">Save changes<\u002Fbutton><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- password -->\n  <div style=\"background:#fff;border:1px solid #E2E8F0;border-radius:18px;padding:24px;margin-bottom:22px\">\n    <h2 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:18px;margin:0 0 18px\">Change password<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;max-width:560px\">\n      <div style=\"grid-column:1/-1\"><label style=\"display:block;font-size:13px;font-weight:600;color:#334155;margin-bottom:6px\">Current password<\u002Flabel><input type=\"password\" placeholder=\"••••••••\" style=\"width:100%;border:1px solid #E2E8F0;border-radius:11px;padding:12px 14px;font-size:14.5px;outline:none\" style-focus=\"border-color:#4F46E5;box-shadow:0 0 0 3px #EEF2FF\"><\u002Fdiv>\n      <div><label style=\"display:block;font-size:13px;font-weight:600;color:#334155;margin-bottom:6px\">New password<\u002Flabel><input type=\"password\" placeholder=\"••••••••\" style=\"width:100%;border:1px solid #E2E8F0;border-radius:11px;padding:12px 14px;font-size:14.5px;outline:none\" style-focus=\"border-color:#4F46E5;box-shadow:0 0 0 3px #EEF2FF\"><\u002Fdiv>\n      <div><label style=\"display:block;font-size:13px;font-weight:600;color:#334155;margin-bottom:6px\">Confirm new password<\u002Flabel><input type=\"password\" placeholder=\"••••••••\" style=\"width:100%;border:1px solid #E2E8F0;border-radius:11px;padding:12px 14px;font-size:14.5px;outline:none\" style-focus=\"border-color:#4F46E5;box-shadow:0 0 0 3px #EEF2FF\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:18px\"><button style=\"background:#fff;color:#4F46E5;border:1.5px solid #C7D2FE;border-radius:11px;padding:11px 22px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:14px;cursor:pointer\" style-hover=\"background:#EEF2FF\">Update pas ndow.scrollTo(0,0);} },\n      toggleMenu:()=>this.setState({menuOpen:!s.menuOpen}),\n      goDash:()=>this.go('dashboard'), goCatalog:()=>this.go('catalog'),\n      goMyLearning:()=>this.go('mylearning'), goLogin:()=>this.go('login'),\n      goSignup:()=>this.go('signup'), logout:()=>this.logout(),\n      // auth\n      authName:s.authName, authEmail:s.authEmail, authPass:s.authPass,\n      onAuthName:(e)=>this.setState({authName:e.target.value}),\n      onAuthEmail:(e)=>this.setState({authEmail:e.target.value}),\n      onAuthPass:(e)=>this.setState({authPass:e.target.value}),\n      doAuth:()=>this.doAuth(),\n      signupPerks,\n      // dashboard\n      todayLabel, streak:7, stats,\n      continueCourses:enrichEnrolled, recommended, activity,\n      // catalog\n      categories, catalogCourses, sortOptions,\n      catSearch:s.catSearch, catSort:s.catSort,\n      catCount:catalogCourses.length, catCategory:s.catCategory,\n      levelFilters:['Beginner','Intermediate','All Levels'],\n      catLabelSuffix:(s.catCategory!=='All'?' in '+s.catCategory:'')+(s.catSearch.trim()?' for “'+s.catSearch.trim()+'”':''),\n      catEmpty:catalogCourses.length===0,\n      onCatSearch:(e)=>this.setState({catSearch:e.target.value}),\n      onCatSort:(e)=>this.setState({catSort:e.target.value}),\n      clearFilters:()=>this.setState({catCategory:'All',catSearch:''}),\n      // course detail\n      cur, curriculumView, ratingBars, relatedCourses,\n      curEnrolled, curNotEnrolled:!curEnrolled, curProgress, curProgressPct:curProgress+'%',\n      curIncludes:[\n        {icon:'🎬', label:cur.hours+' hours of on-demand video'},\n        {icon:'📄', label:'24 downloadable resources'},\n        {icon:'∞', label:'Full lifetime access'},\n        {icon:'📱', label:'Access on mobile and desktop'},\n        {icon:'🏆', label:'Certificate of completion'}\n      ],\n      curLevel:cur.level, curHours:cur.hours+' hours on-demand',\n      curLecturesLabel:totalCurLectures+' lectures',\n      onEnroll:()=>this.enroll(cur.id),\n      onResumeCur:()=>this.openPlayer(cur.id),\n      backToCatalog:()=>this.go('catalog'),\n      // player\n      pc, playerSections, curLec, curLecSection:secTitle,\n      pPct, pPctLabel:pPct+'%', pCompletedCount, pTotal,\n      curLecNum:(curIdx+1), curDone, curNotDone:!curDone,\n      playerTab:s.playerTab, playerTabs,\n      isOverviewTab:s.playerTab==='overview', isNotesTab:s.playerTab==='notes', isQaTab:s.playerTab==='qa',\n      markComplete:()=>this.toggleComplete(pc.id,curLecId),\n      nextLecture:()=>{ const n=pflat[curIdx+1]; if(n)this.selectLecture(n.id); },\n      prevLecture:()=>{ const p=pflat[curIdx-1]; if(p)this.selectLecture(p.id); },\n      hasNext:curIdx<pflat.length-1, hasPrev:curIdx>0,\n      noteText:s.noteText, onNoteText:(e)=>this.setState({noteText:e.target.value}),\n      backToCourse:()=>this.openCourse(pc.id),\n      qaList:[\n        {name:'Maya T.',initials:'MT',color:'#0EA5A4',ago:'3 days ago',q:'Is it okay to use a different editor than the one shown in the video?',a:'Absolutely — everything here works in any editor. Use whatever you are comfortable with.',answers:2},\n        {name:'Devon P.',initials:'DP',color:'#8B5CF6',ago:'1 week ago',q:'I got stuck on the project setup step — anything obvious I might be missing?',a:'Double-check your version in the terminal; that trips most people up at this stage.',answers:5}\n      ],\n      // my learning\n      myLearning:mlCourses, mlFilter, mlTabs, mlEmpty:mlCourses.length===0,\n      mlInProgress:s.enrolled.filter(e=>e.progress<100&&e.progress>0).length,\n      mlCompleted:s.enrolled.filter(e=>e.progress===100).length,\n      mlTotal:s.enrolled.length,\n      // profile\n      notify, profileInitials:user.initials,\n      onUserName:(e)=>this.setState({user:{...u,name:e.target.value}}),\n      onUserEmail:(e)=>this.setState({user:{...u,email:e.target.value}}),\n      avatarOptions\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
